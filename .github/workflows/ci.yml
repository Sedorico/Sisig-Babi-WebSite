on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Backend Dependencies
      run: |
        cd server
        npm install

    - name: Clean and Reinstall Frontend Dependencies
      run: |
        cd client
        rm -rf node_modules package-lock.json
        npm install

    - name: Lint Frontend
      run: |
        cd client
        npm run lint

    - name: Build Frontend
      run: |
        cd client
        npm run build
